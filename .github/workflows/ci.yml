name: CI

on:
  push:
    branches: [main]

jobs:
  check:
    name: Type check / Lint / Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run check (type-check + lint + format)
        run: npm run check
