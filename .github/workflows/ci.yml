name: CI

on:
  push:
    branches: [main]

jobs:
  check:
    name: Type check / Lint / Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run check (type-check + lint + format)
        run: npm run check

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Supabase
        run: npx supabase start

      - name: Set up .env.local
        run: |
          SUPABASE_URL=$(npx supabase status | grep "API URL" | awk '{print $NF}')
          ANON_KEY=$(npx supabase status | grep "anon key" | awk '{print $NF}')
          SERVICE_KEY=$(npx supabase status | grep "service_role key" | awk '{print $NF}')
          cat > .env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SERVICE_KEY}
          RESEND_API_KEY=dummy
          EOF

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
